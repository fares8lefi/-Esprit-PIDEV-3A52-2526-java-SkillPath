<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <script>
      var captchaResponse = "";
      var captchaVerified = false;

      function captchaCallback(response) {
          captchaResponse = response;
          captchaVerified = true;
          updateCaptchaStatus(true);
      }

      function getCaptchaResponse() {
          return captchaResponse;
      }

      function isCaptchaVerified() {
          return captchaVerified;
      }

      function updateCaptchaStatus(verified) {
          var statusEl = document.getElementById('captcha-status');
          var checkEl = document.getElementById('checkmark');
          if (verified && statusEl && checkEl) {
              statusEl.style.display = 'flex';
              checkEl.innerHTML = '&#10003;';
              checkEl.style.color = '#10b981';
          }
      }

      window.addEventListener('load', function() {
          var wrapper = document.getElementById('captcha-wrapper');
          if (wrapper) {
              wrapper.setAttribute('role', 'region');
              wrapper.setAttribute('aria-label', 'Vérification de sécurité reCAPTCHA');
          }
      });
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      body {
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: stretch;
        padding: 2px 4px;
      }

      /* Étiquette SÉCURITÉ */
      .captcha-label {
        font-size: 9.5px;
        font-weight: 700;
        color: #a1a1aa;
        text-transform: uppercase;
        letter-spacing: 0.9px;
        margin-bottom: 4px;
        padding-left: 2px;
      }

      /* Boîte contenant le widget reCAPTCHA */
      .captcha-wrapper {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        padding: 3px 5px 3px 5px;
        border: 1.5px solid rgba(139, 92, 246, 0.30);
        border-radius: 10px;
        background: linear-gradient(
          135deg,
          rgba(139, 92, 246, 0.07) 0%,
          rgba(217, 70, 239, 0.07) 100%
        );
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18);
        transition: border-color 0.25s ease, box-shadow 0.25s ease;
      }

      .captcha-wrapper:hover {
        border-color: rgba(139, 92, 246, 0.50);
        box-shadow: 0 6px 20px rgba(139, 92, 246, 0.18);
      }

      /* Le div Google reCAPTCHA — on ne le scale PAS */
      .g-recaptcha {
        display: block;
      }

      /* iframe injecté par Google */
      .g-recaptcha iframe {
        border-radius: 4px;
        display: block;
      }

      /* Bandeau de confirmation après validation */
      .captcha-status-container {
        display: none;
        align-items: center;
        gap: 6px;
        margin-top: 5px;
        font-size: 11px;
        color: #10b981;
        animation: fadeIn 0.3s ease;
      }

      .captcha-checkmark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: rgba(16, 185, 129, 0.12);
        font-weight: bold;
        font-size: 11px;
      }

      .captcha-success-text {
        font-weight: 600;
      }

      /* Animation */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-3px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.6); }
        70%       { box-shadow: 0 0 0 5px rgba(139, 92, 246, 0); }
      }

      .captcha-wrapper.loading {
        animation: pulse 2s infinite;
      }
    </style>
  </head>
  <body>
    <div class="captcha-label">Sécurité</div>
    <div class="captcha-wrapper" id="captcha-wrapper">
      <div class="g-recaptcha"
           data-sitekey="__SITE_KEY__"
           data-theme="dark"
           data-callback="captchaCallback">
      </div>
      <div class="captcha-status-container" id="captcha-status">
        <div class="captcha-checkmark" id="checkmark"></div>
        <span class="captcha-success-text">Vérifié ✓</span>
      </div>
    </div>
  </body>
</html>
