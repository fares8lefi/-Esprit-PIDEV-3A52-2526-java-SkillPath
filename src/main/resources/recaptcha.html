<!DOCTYPE html>
<html>
  <head>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <script>
      var captchaResponse = "";
      function captchaCallback(response) {
          captchaResponse = response;
      }
      function getCaptchaResponse() {
          return captchaResponse;
      }
    </script>
    <style>
      body {
        background-color: transparent;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }
      /* Optional: style for dark mode if needed */
    </style>
  </head>
  <body>
    <!-- The site key will be replaced dynamically by the Java controller -->
    <div class="g-recaptcha" data-sitekey="__SITE_KEY__" data-theme="dark" data-callback="captchaCallback"></div>
  </body>
</html>
