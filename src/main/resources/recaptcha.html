<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <script>
      var captchaResponse = "";
      var captchaVerified = false;

      function captchaCallback(response) {
          captchaResponse = response;
          captchaVerified = true;
          // Notify JavaFX if bridge is available
          if (window.javaApp) {
              window.javaApp.onVerified(true);
              window.javaApp.onTokenReceived(response);
          }
      }

      function getCaptchaResponse() {
          return captchaResponse;
      }

      function isCaptchaVerified() {
          return captchaVerified;
      }

      // Detect challenge popup
      setInterval(function() {
          var iframes = document.getElementsByTagName('iframe');
          var challengeFound = false;
          for (var i = 0; i < iframes.length; i++) {
              // Challenge iframes usually have a large height (around 580px or 600px)
              if (iframes[i].title && iframes[i].title.includes('recaptcha') && iframes[i].offsetHeight > 200) {
                  challengeFound = true;
                  break;
              }
          }
          if (window.javaApp) {
              window.javaApp.onChallengeStateChanged(challengeFound);
          }
          updateChallengeMode(challengeFound);
      }, 500);

    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        background: transparent;
        font-family: 'Inter', -apple-system, sans-serif;
      }

      body {
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        padding: 0;
        overflow: hidden; /* Start hidden */
      }

      /* Le div Google reCAPTCHA */
      .g-recaptcha {
        display: block;
        margin-top: 15px;
      }

      /* When challenge is visible, allow overflow and adjust body */
      body.challenge-mode {
          overflow: visible;
          justify-content: flex-start;
      }

      .captcha-label {
          display: none;
      }
    </style>
    <script>
        function updateChallengeMode(isChallenge) {
            if (isChallenge) {
                document.body.classList.add('challenge-mode');
            } else {
                document.body.classList.remove('challenge-mode');
            }
        }
    </script>
  </head>
  <body>
    <div class="g-recaptcha"
         data-sitekey="__SITE_KEY__"
         data-theme="dark"
         data-callback="captchaCallback">
    </div>
  </body>
</html>
